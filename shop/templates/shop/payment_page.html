<!DOCTYPE html>
<html>
<head>
    <title>Pago Seguro</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            width: 400px;
            margin: auto;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border-radius: 15px;
            padding: 25px;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card-number {
            font-size: 24px;
            letter-spacing: 3px;
            margin: 20px 0;
        }

        .payment-box {
            width: 450px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>

</head>
<body>

    <h1>💳 Pasarela de Pago Simulada</h1>

    <div class="card">
        <h3>SHARK MARKET BANK</h3>

        <div class="card-number">
            1234 5678 9012 3456
        </div>

        <p>Titular: Cliente Demo</p>
        <p>Validez: 12/30</p>
    </div>

    <div class="payment-box">

        <h2>Pedido #{{ order.id }}</h2>

        <form action="{% url 'payment_success' order.id %}" method="post">
            {% csrf_token %}

            <input type="text" placeholder="Nombre del titular" required>

            <input type="text" placeholder="Número de tarjeta" required>

            <input type="text" placeholder="MM/AA" required>

            <input type="text" placeholder="CVV" required>

            <br><br>

            <button type="submit">
                Pagar ahora
            </button>

        </form>

    </div>

</body>
</html>
