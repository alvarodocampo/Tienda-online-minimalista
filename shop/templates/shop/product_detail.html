<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>

    <h1>{{ product.name }}</h1>

    {% if product.image %}
        <img src="{{ product.image.url }}" width="300">
    {% endif %}

    <p>{{ product.description }}</p>

    <p>Precio: {{ product.price }} €</p>

    <a href="{% url 'add_to_cart' product.id %}">
        Añadir al carrito
    </a>

    <br><br>

    <a href="/">Volver a productos</a>

</body>
</html>
